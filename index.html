<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LiveComOsAmigos</title>

  <!-- SEO e Social -->
  <meta name="description" content="LiveComOsAmigos - Lives, games e diversão com a galera">
  <link rel="icon" href="Logo.png" />
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header>
    <div class="header-content">
      <!-- Se você tiver a imagem Logo.png, ela aparecerá aqui -->
      <img src="Logo.png" alt="Logo LiveComOsAmigos" class="main-logo">
      <h1>LiveComOsAmigos</h1>
      <p>Lives ao vivo, games, resenha e uma comunidade pra jogar junto.</p>
    </div>
  </header>

  <main>
    <!-- Seção do Vídeo em Destaque -->
    <section class="video-section">
      <div class="video-container">
        <iframe
          src="https://youtube.com"
          title="LiveComOsAmigos"
          frameborder="0"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
          allowfullscreen>
        </iframe>
      </div>
    </section>

    <!-- Texto de Chamada -->
    <section class="community-text">
      <h2>🎮 Mais que lives, uma comunidade</h2>
      <p>Jogar junto, trocar ideia e se divertir com a galera.</p>
    </section>

    <!-- Botões de Ação (Cards) -->
    <section class="cards-container">
      <div class="card">
        <h3>YouTube</h3>
        <a href="https://youtube.com" target="_blank" class="btn youtube">Ver o canal</a>
      </div>

      <div class="card">
        <h3>Discord</h3>
        <a href="https://discord.gg" target="_blank" class="btn discord">Entrar no Discord</a>
      </div>
    </section>

    <!-- Dock estilo MacOS com links (Discord no lugar do Spotify) -->
    <nav class="dock">
      <div class="dock-container">
        <a href="https://github.com" target="_blank" title="GitHub">
          <img src="https://flaticon.com" alt="GitHub">
        </a>
        <a href="https://youtube.com" target="_blank" title="YouTube">
          <img src="https://flaticon.com" alt="YouTube">
        </a>
        <!-- Ícone do Discord atualizado -->
        <a href="https://discord.gg" target="_blank" title="Discord">
          <img src="https://flaticon.com" alt="Discord">
        </a>
      </div>
    </nav>

  </main>

  <footer>
    <p>© 2026 • LiveComOsAmigos</p>
    <span class="dev">⚡ Criado por <strong>Zeus-portable</strong> (Lucas)</span>
  </footer>

</body>
</html>
