<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LiveComOsAmigos</title>

  <!-- SEO -->
  <meta name="description" content="LiveComOsAmigos - Lives, games e diversão com a galera">
  <meta name="keywords" content="LiveComOsAmigos, lives, games, comunidade gamer, youtube gamer">
  <meta name="author" content="LiveComOsAmigos">

  <!-- Social -->
  <meta property="og:title" content="LiveComOsAmigos">
  <meta property="og:description" content="Lives, games e diversão com a galera">
  <meta property="og:image" content="Logo.png">
  <meta property="og:type" content="website">

  <!-- Favicon -->
  <link rel="icon" href="Logo.png" />

  <!-- CSS externo -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header>
    <img src="Logo.png" alt="LiveComOsAmigos">
    <h1>LiveComOsAmigos</h1>
    <p>Lives ao vivo, games, resenha e uma comunidade pra jogar junto.</p>
  </header>

  <main>

    <section class="video-section">
      <h2>🎥 Conheça o canal</h2>
      <div class="video-wrapper">
        <iframe
          loading="lazy"
          src="https://www.youtube.com/embed/Q_-CARIAfns?rel=0"
          title="LiveComOsAmigos"
          allowfullscreen>
        </iframe>
      </div>
    </section>

    <section class="community">
      <h2>🎮 Mais que lives, uma comunidade</h2>
      <p>Jogar junto, trocar ideia e se divertir com a galera.</p>
    </section>

    <section class="cards">
      <div class="card">
        <h3>YouTube</h3>
        <a class="btn youtube" href="https://www.youtube.com/@LiveComOsAmigos" target="_blank">
          Ver o canal
        </a>
      </div>

      <div class="card">
        <h3>Discord</h3>
        <a class="btn discord" href="https://discord.gg/K8D59QQnjn" target="_blank">
          Entrar no Discord
        </a>
      </div>
    </section>

    <!-- Dock estilo MacOS com links -->
    <div class="dock">
      <a href="https://github.com/Lucasailton" target="_blank">
        <img src="https://cdn-icons-png.flaticon.com/512/25/25231.png" alt="GitHub">
      </a>
      <a href="https://www.youtube.com/@LiveComOsAmigos" target="_blank">
        <img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png" alt="YouTube">
      </a>
      <a href="https://discord.gg/K8D59QQnjn" target="_blank">
        <img src="https://cdn-icons-png.flaticon.com/512/2111/2111624.png" alt="Discord">
      </a>
    </div>

  </main>

  <footer>
    © 2025 • LiveComOsAmigos <br>
    <span class="dev">⚡ Criado por <strong>Zeus-portable</strong> (Lucas)</span>
  </footer>

  <!-- JS externo -->
  <script src="script.js"></script>
</body>
</html>
